apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-hub
  labels:
    app: knowledge-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge-hub
  template:
    metadata:
      labels:
        app: knowledge-hub
    spec:
      containers:
      - name: nextjs
        image: your-registry/knowledge-hub:latest
        ports:
        - containerPort: 3000
        env:
        - name: MD_SOURCE
          value: "https://raw.githubusercontent.com/kim-ae/knowledge-hub/main/knowledge-hub.md"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-hub
spec:
  selector:
    app: knowledge-hub
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
