name: Push image to registry with SemVer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'CHANGELOG.md'
      - 'src/**'
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'CHANGELOG.md'
      - 'src/**'

jobs:
  docker_build_push:
    name: Build and Push
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build-push.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: 'Docker Login'
      uses: docker/login-action@v4
      with:
        username: ${{ vars.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    - name: Build image and push RC to container registry
      id: build-push
      run: |
        is_rc=${{ github.ref != 'refs/heads/main' }}
        version=$(cat CHANGELOG.md | cat CHANGELOG.md | grep -oP -m1 "## \[\K([0-9]+\.[0-9]+\.[0-9]+)")${is_rc}
        repository_url=docker.io/kimae09/knowledge-hub:${version}
        docker build --build-arg version=${version} . -t $repository_url
        docker push $repository_url
        echo "version=$version" >> $GITHUB_OUTPUT
    - name: Create tag
      run: |
        git config --global user.name 'Automated workflow'
        git config --global user.email 'automated-workflow@kim.tec.br'
        git tag -f ${{ steps.build-push.outputs.version }}
        git push -f origin ${{ steps.build-push.outputs.version }}
